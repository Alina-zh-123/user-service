name: CI Pipeline

on:
  push:
    branches:
      - "feature/USR-0"
  pull_request:
    branches:
      - "main"

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:24.0.5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: user_service_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build & Test
        run: mvn -B clean verify
        env:
          SPRING_LIQUIBASE_CHANGE_LOG: classpath:/db.changelog/master.xml
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/user_service_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=user-service \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Build Docker image
        run: docker build -t user-service:latest .

      - name: Save Docker image as artifact
        run: docker save user-service:latest -o user-service.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-service-image
          path: user-service.tar
